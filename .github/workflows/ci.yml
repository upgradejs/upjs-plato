name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [18, 20, 22, 24]
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so churn collection has commits to read.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: yarn

      - run: yarn install --frozen-lockfile

      # Coverage flags require Node >= 22 (--test-coverage-exclude landed in
      # 22.10 and was not backported). For Node 16 / 18 run plain tests so
      # the job reports actual library compatibility rather than failing at
      # the unknown flag.
      - name: Run tests
        run: |
          if [ "${{ matrix.node }}" = "22" ] || [ "${{ matrix.node }}" = "24" ]; then
            yarn test:coverage
          else
            yarn test
          fi
